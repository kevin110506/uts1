name: Laravel

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    steps:
    # 1. WAJIB: Checkout dulu agar file kodinganmu ada di server
    - uses: actions/checkout@v4

    # 2. Setup PHP setelah file kodingan ada
    - name: Setup PHP
      uses: shivammathur/setup-php@v2 # Gunakan versi tag @v2 agar lebih stabil
      with:
        php-version: '8.5' # Gunakan 8.2 atau 8.3 (8.5 belum rilis stabil di banyak environment)
        extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite
        coverage: none

    # 3. Copy .env (Cukup satu kali saja)
    - name: Prepare Environment File
      run: cp .env.example .env

    # 4. Install Dependencies
    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    # 5. Generate Key
    - name: Generate key
      run: php artisan key:generate

    # 6. Directory Permissions
    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache

    # 7. Create Database (SQLite)
    - name: Create Database
      run: |
        mkdir -p database
        touch database/database.sqlite

    # 8. Run Migrations & Tests
    - name: Execute tests
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: |
        php artisan migrate --force
        php artisan test
